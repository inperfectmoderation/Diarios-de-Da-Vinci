<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Diários de Da Vinci: A Ciência Oculta por Trás dos Esboços-->
    <title>Diarios de Da Vinci</title>
    <style>
        header{
            background-color: #a5bff3;
            color: black;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
            border: 5px solid #97b8fa;
            
        }
        main{
            background-color:white;
            color: black;
            max-width: 800px;
            margin: 0, auto;
            padding: 16px;
            display: flex;
        }
        img{
            width: 80px;
            height: 80px;
        }
        .artigo-autor{
            font-weight: bold;
        }
        article{
            display: flex;
        }
    </style>
</head>
<body>
    <header>
    <h1>Diarios de Da Vinci</h1>
    <p> A escrita espelhada</p>
    </header>
    <main>
        <article>
            <img src="leonardo.jpg" alt="ilustracao de da vinci">
            <div>
            <h3>Os segredos dos cadernos de Da vinci</h3>
            <p class="artigo-autor">Por: Roberto</p>
            <p>ola bem vindos ao meu incrivel projeto feito em todo em programacao</p>
            <button>👽<span>0</span></button>
            <button>😁<span>0</span></button>
            </div>
        </article>
        
    </main>
</body>
<script>
    const botoes = document.querySelectorAll("button");

    botoes.forEach(function(botao){
        botao.addEventListener("click", botaoClicado);
        function botaoClicado(){
            console.log("fui clicado");
            let texto = botao.querySelector("span");
            texto.textContent++;
        }
    }
)
</script>
</html>
